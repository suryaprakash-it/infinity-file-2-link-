<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Share - Download</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="infinity-container">
        <div class="logo-space">
            <h1>INFINITY <span>SHARE</span></h1>
        </div>

        <div class="file-box">
            <div class="file-icon">📦</div>
            <div class="file-name">{{ file.file_name }}</div>
            <div class="file-meta">
                Size: {{ file_size_formatted }} | Downloads: {{ file.download_count }}
            </div>
        </div>

        <div class="action-buttons">
            <a href="/api/download/{{ file.file_id }}" class="btn btn-primary">Download File</a>
            <button onclick="copyToClipboard()" id="copyBtn" class="btn btn-secondary">Copy Link</button>
        </div>

        <div class="qr-section">
            <div class="file-meta">Scan to download on mobile</div>
            <div class="qr-box">
                <!-- Using an optimized lightweight public API for instant client-side QR generation -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data={{ current_url }}" alt="QR Code">
            </div>
        </div>
    </div>

    <script>
        function copyToClipboard() {
            navigator.clipboard.writeText(window.location.href);
            const btn = document.getElementById('copyBtn');
            btn.innerText = 'Copied! ✅';
            setTimeout(() => {
                btn.innerText = 'Copy Link';
            }, 2000);
        }
    </script>
</body>
</html>
